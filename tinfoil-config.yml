cvm-version: 0.7.1
cpus: 4
memory: 32768

containers:
  - name: "qmd"
    # Image is automatically updated by the GitHub Actions workflow
    image: "ghcr.io/vitadao/vita-tinfoil-agent-qmd:v0.1.0@sha256:7bde648fc4cde6a944c68b60cbd50e80b36c5a665400613baff56df1f04ec3e2"
    env:
      - PORT: "8000"
      - DATA_DIR: "/data"
      - INACTIVITY_MINUTES: "15"
    secrets:
      - QMD_API_SECRET
    command: []

shim:
  upstream-port: 8000
  paths:
    - /ingest
    - /predict
    - /workspace
    - /consolidate
    - /user
    - /health
