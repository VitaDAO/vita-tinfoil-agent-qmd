cvm-version: 0.7.1
cpus: 4
memory: 32768

containers:
  - name: "qmd"
    # Image is automatically updated by the GitHub Actions workflow
    image: "ghcr.io/vitadao/vita-tinfoil-agent-qmd:v0.1.1@sha256:db48eb32cdc1b2298f2ee0f1b01120133b7238c9ddb92e3f2c4b4947a14c0851"
    env:
      - PORT: "8000"
      - DATA_DIR: "/data"
      - INACTIVITY_MINUTES: "15"
    secrets:
      - QMD_API_SECRET
    command: []

shim:
  upstream-port: 8000
  paths:
    - /ingest
    - /predict
    - /workspace/*
    - /consolidate/*
    - /user
    - /health
