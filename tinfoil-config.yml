cvm-version: 0.7.1
cpus: 4
memory: 32768

containers:
  - name: "qmd"
    # Image is automatically updated by the GitHub Actions workflow
    image: "ghcr.io/vitadao/vita-tinfoil-agent-qmd:v0.1.0@sha256:b933ea77e0eec989c05b320932b10104ebdf058722a579cfe759f14de33dec8e"
    env:
      - PORT: "8000"
      - DATA_DIR: "/data"
      - INACTIVITY_MINUTES: "15"
    secrets:
      - QMD_API_SECRET
    command: []

shim:
  upstream-port: 8000
  paths:
    - /ingest
    - /predict
    - /workspace
    - /consolidate
    - /user
    - /health
