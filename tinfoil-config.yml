cvm-version: 0.7.1
cpus: 4
memory: 32768

containers:
  - name: "qmd"
    # Image is automatically updated by the GitHub Actions workflow
    image: "ghcr.io/vitadao/vita-tinfoil-agent-qmd:v0.1.1@sha256:7bbb712dae42659b18db5b339c7865e9917666bbad1ff2584a6926d413c8cd2b"
    env:
      - PORT: "8000"
      - DATA_DIR: "/data"
      - INACTIVITY_MINUTES: "15"
    secrets:
      - QMD_API_SECRET
    command: []

shim:
  upstream-port: 8000
  paths:
    - /ingest
    - /predict
    - /workspace/*
    - /consolidate/*
    - /user
    - /health
